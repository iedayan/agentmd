name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Install
        run: pnpm install
      - name: Build
        run: pnpm -r run build
      - name: Lint
        run: pnpm -r run lint
      - name: Test
        run: pnpm -r run test
