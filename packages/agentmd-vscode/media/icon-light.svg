<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F0F1A"/>
      <stop offset="50%" stop-color="#1A1030"/>
      <stop offset="100%" stop-color="#241B4D"/>
    </linearGradient>
    <linearGradient id="glow" x1="40" y1="40" x2="216" y2="216" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#00F0FF"/>
    </linearGradient>
  </defs>

  <!-- Rounded dark background -->
  <rect width="256" height="256" rx="56" fill="url(#bg)"/>

  <!-- Subtle outer ring glow -->
  <circle cx="128" cy="128" r="96" stroke="url(#glow)" stroke-width="1.5" opacity="0.35"/>
  <circle cx="128" cy="128" r="80" stroke="url(#glow)" stroke-width="1" opacity="0.2"/>

  <!-- Terminal chevron ">_" symbol -->
  <!-- > chevron -->
  <path d="M72 92L116 128L72 164"
    stroke="url(#glow)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- _ cursor -->
  <line x1="128" y1="164" x2="188" y2="164"
    stroke="#00F0FF" stroke-width="20" stroke-linecap="round"/>
</svg>
